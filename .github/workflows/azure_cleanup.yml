name: Cleanup Azure Deployments

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment (must match deployed stack)'
        type: choice
        options:
          - azure-prod
          - azure-uat
        default: azure-prod
  workflow_call:
    inputs:
      deploy_env:
        type: string
        required: true

jobs:
  deploy-test-cleanup:
    runs-on: ubuntu-22.04
    environment: ${{ inputs.deploy_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_AKS_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_AKS_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_AKS_SUBSCRIPTION_ID }}

      - name: Terraform destroy (always cleanup)
        if: always()
        run: |
            az group delete --name tf-demo-offer-inc-rg --yes