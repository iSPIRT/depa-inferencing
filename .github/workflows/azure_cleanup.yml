name: Cleanup Azure Deployments

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment (must match deployed stack)'
        type: choice
        options:
          - azure-prod
          - azure-uat
        default: azure-prod
  workflow_call:
    inputs:
      deploy_env:
        type: string
        required: true

jobs:
  deploy-test-cleanup:
    runs-on: ${{ fromJSON(inputs.deploy_env == 'azure-uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    environment: ${{ inputs.deploy_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        run: |
          set -e
          az login --identity --client-id "$AZURE_CLIENT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_AKS_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_AKS_SUBSCRIPTION_ID }}

      - name: Terraform destroy (always cleanup)
        if: always()
        run: |
            az group delete --name tf-demo-offer-inc-rg --yes