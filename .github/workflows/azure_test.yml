name: Test Azure Deployment

permissions:
  contents: read
  id-token: write

env:
  SECURE_REQUEST_WHEEL_URL: >-
    https://github.com/saranggalada/bidding-auction-servers/releases/download/v0.1.0/secure_request-0.1.0-py3-none-any.whl

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment (must match deployed stack)'
        type: choice
        options:
          - azure-prod
          - azure-uat
        default: azure-prod
      secure_invoke_backend:
        description: >-
          Secure invoke: python SDK or docker image
        type: choice
        options:
          - python
          - docker
        default: python
  workflow_call:
    inputs:
      deploy_env:
        type: string
        required: true
      secure_invoke_backend:
        description: 'Secure invoke: python SDK or docker image'
        type: string
        required: false
        default: python

jobs:
  test-azure:
    runs-on: ubuntu-22.04
    environment: ${{ inputs.deploy_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_AKS_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_AKS_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_AKS_SUBSCRIPTION_ID }}

      - name: Find IP address of offer frontend load balancer
        run: |
          az aks get-credentials --resource-group tf-demo-offer-inc-rg --name tf-demo-offer-inc-aks --overwrite-existing
          OFE_IP=$(kubectl get svc ofe-lb -n default -o jsonpath="{.status.loadBalancer.ingress[0].ip}")
          echo "OFE_IP=$OFE_IP" >> $GITHUB_ENV

      - name: Run secure invoke (Python SDK)
        if: ${{ inputs.secure_invoke_backend != 'docker' }}
        env:
          KMS_URL: ${{ inputs.deploy_env == 'azure-uat' && 'https://depa-inferencing-kms-uat-azure.ispirt.in' || 'https://depa-inferencing-kms-azure.ispirt.in' }}
          OFFER_URL: http://${{ env.OFE_IP }}:51052/v1/getbids
          SECURE_REQUEST_RETRIES: '3'
        working-directory: ./tools/secure-invoke
        run: |
          python3 -m venv .venv-secure-invoke
          . .venv-secure-invoke/bin/activate
          python -m pip install --upgrade pip
          pip install "${SECURE_REQUEST_WHEEL_URL}"
          export LD_LIBRARY_PATH="$(
            python -c "import secure_request_client, os; print(os.path.join(os.path.dirname(secure_request_client.__file__), 'lib'))"
          ):${LD_LIBRARY_PATH:-}"
          python ./run_azure_test_python_sdk.py "${GITHUB_WORKSPACE}/tools/requests/get_bids_request.json"

          # cleanup venv
          deactivate
          rm -rf .venv-secure-invoke

      - name: Run secure invoke (Docker)
        if: ${{ inputs.secure_invoke_backend == 'docker' }}
        env:
          KMS_URL: ${{ inputs.deploy_env == 'azure-uat' && 'https://depa-inferencing-kms-uat-azure.ispirt.in' || 'https://depa-inferencing-kms-azure.ispirt.in' }}
        working-directory: ./tools/secure-invoke
        run: |
          REQUESTS_DIR=${GITHUB_WORKSPACE}/tools/requests
          sed -i 's|/home/azureuser/requests|'"$REQUESTS_DIR"'|g' ./.env
          sed -i 's|<KMS_HOST>|'"$KMS_URL"'|g' ./.env
          sed -i 's|<hostname>|'"$OFE_IP"'|g' ./.env
          sed -i '/CA_CERT/d' ./.env
          sed -i '/CLIENT_CERT/d' ./.env
          sed -i '/CLIENT_KEY/d' ./.env
          ./secure_invoke_test.sh
