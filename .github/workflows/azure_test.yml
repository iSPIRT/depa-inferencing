name: Test Azure Deployment

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment (must match deployed stack)'
        type: choice
        options:
          - azure-prod
          - azure-uat
        default: azure-prod
  workflow_call:
    inputs:
      deploy_env:
        type: string
        required: true

jobs:
  test-azure:
    runs-on: ${{ fromJSON(inputs.deploy_env == 'azure-uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    environment: ${{ inputs.deploy_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        run: |
          set -e
          az login --identity --client-id "$AZURE_CLIENT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_AKS_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_AKS_SUBSCRIPTION_ID }}

      - name: Find IP address of offer frontend load balancer
        run: |
          az aks get-credentials --resource-group tf-demo-offer-inc-rg --name tf-demo-offer-inc-aks --overwrite-existing
          OFE_IP=$(kubectl get svc ofe-lb -n default -o jsonpath="{.status.loadBalancer.ingress[0].ip}")
          echo "OFE_IP=$OFE_IP" >> $GITHUB_ENV

      - name: Run secure invoke
        env:
          KMS_URL: ${{ inputs.deploy_env == 'azure-uat' && 'https://depa-inferencing-kms-uat-azure.ispirt.in' || 'https://depa-inferencing-kms-azure.ispirt.in' }}
        working-directory: ./tools/secure-invoke
        run: |
          REQUESTS_DIR=${GITHUB_WORKSPACE}/tools/requests
          sed -i 's|/home/azureuser/requests|'"$REQUESTS_DIR"'|g' ./.env
          sed -i 's|<KMS_HOST>|'"$KMS_URL"'|g' ./.env
          sed -i 's|<hostname>|'"$OFE_IP"'|g' ./.env
          sed -i '/CA_CERT/d' ./.env
          sed -i '/CLIENT_CERT/d' ./.env
          sed -i '/CLIENT_KEY/d' ./.env
          ./secure_invoke_test.sh
