name: Azure CI Pipeline

permissions:
  contents: read
  id-token: write

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'prod = prod images/KMS; uat = uat images/KMS'
        required: false
        default: prod
        type: choice
        options:
          - prod
          - uat
      run_cleanup:
        description: 'Cleanup after deployment'
        required: false
        default: true
        type: boolean

jobs:
  azure_deploy:
    name: Deploy on Azure
    uses: ./.github/workflows/azure_deploy.yml
    secrets: inherit
    with:
      deploy_target: ${{ github.event.inputs.deploy_target || 'prod' }}

  azure_test:
    name: Test Azure Deployment
    needs: azure_deploy
    uses: ./.github/workflows/azure_test.yml
    secrets: inherit
    with:
      deploy_target: ${{ github.event.inputs.deploy_target || 'prod' }}

  azure_cleanup:
    name: Cleanup Azure Deployments
    needs: [azure_deploy, azure_test]
    if: always() && (github.event_name != 'workflow_dispatch' || inputs.run_cleanup != 'false')
    uses: ./.github/workflows/azure_cleanup.yml
    secrets: inherit
