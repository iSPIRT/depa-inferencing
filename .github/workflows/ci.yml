name: Azure CI Pipeline

permissions:
  contents: read
  id-token: write

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: false
        default: azure-prod
        type: choice
        options:
          - azure-prod
          - azure-uat
      run_cleanup:
        description: 'Cleanup after deployment'
        required: false
        default: true
        type: boolean

jobs:
  stack_prod:
    name: Azure stack (prod)
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_env == 'azure-prod'
    uses: ./.github/workflows/azure_stack.yml
    secrets: inherit
    with:
      deploy_env: azure-prod
      run_cleanup: ${{ github.event_name != 'workflow_dispatch' || inputs.run_cleanup }}

  stack_uat:
    name: Azure stack (uat)
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_env == 'azure-uat'
    uses: ./.github/workflows/azure_stack.yml
    secrets: inherit
    with:
      deploy_env: azure-uat
      run_cleanup: ${{ github.event_name != 'workflow_dispatch' || inputs.run_cleanup }}
