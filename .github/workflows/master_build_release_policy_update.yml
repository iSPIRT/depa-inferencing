name: Master Release Build

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      update_kms_policy:
        description: 'Update KMS key release policy'
        required: true
        default: false
        type: boolean
      kms_target_environment:
        description: 'Deployment target'
        required: true
        default: uat
        type: choice
        options:
          - uat
          - prod

      # ── KV Service ────────────────────────────────────────────────────────
      kv_build_ref:
        description: 'KV Service: Branch/tag to build from'
        required: true
        default: 'main'
        type: string
      kv_release_tag:
        description: 'KV Service: Release version'
        required: true
        default: '1.2.1.2'
        type: string
      kv_run_tests:
        description: 'KV Service: Run tests'
        required: true
        default: false
        type: boolean
      kv_run_precommit_checks:
        description: 'KV Service: Run precommit checks'
        required: true
        default: false
        type: boolean

      # ── BA Services ───────────────────────────────────────────────────────
      ba_build_ref:
        description: 'BA Services: Branch/tag to build from'
        required: true
        default: 'main'
        type: string
      ba_release_tag:
        description: 'BA Services: Release version'
        required: true
        default: '4.8.1.2'
        type: string
      ba_services:
        description: 'BA Services to build (comma-separated)'
        required: true
        default: 'bidding_service,buyer_frontend_service'
        type: string
      ba_run_tests:
        description: 'BA Services: Run tests'
        required: true
        default: false
        type: boolean
      ba_run_precommit_checks:
        description: 'BA Services: Run precommit checks'
        required: true
        default: false
        type: boolean

      # ── ACR & SBOMs ───────────────────────────────────────────────────────
      push_to_acr:
        description: 'Push all images to Azure Container Registry'
        required: true
        default: true
        type: boolean
      generate_sboms:
        description: 'Generate SBOMs (requires ACR push)'
        required: true
        default: false
        type: boolean

env:
  BUILD_TYPE: Release
  REGISTRY: ${{ vars.REGISTRY }}
  REPO_PATH: ${{ vars.REPO_PATH }}
  # Shared staging directory on the self-hosted runner for inter-job tar handoff
  # Uses /tmp to avoid permission issues (runner may not have write access to /opt)
  STAGING_DIR: /tmp/runner-staging-${{ github.run_id }}

jobs:

  # ============================================================
  # BUILD KV AND BA IN PARALLEL
  # ============================================================

  build-kv:
    # Stage tars on self-hosted runner
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    timeout-minutes: 1440
    steps:
    - name: Display KV Build Parameters
      run: |
        echo "🚀 KV Service Build"
        echo "Build Ref:    ${{ github.event.inputs.kv_build_ref }}"
        echo "Build Flavor: ${{ github.event.inputs.kms_target_environment == 'uat' && 'nonprod' || 'prod' }}"
        echo "Release Tag:  ${{ github.event.inputs.kv_release_tag }}"
        echo "Run Tests:    ${{ github.event.inputs.kv_run_tests }}"
        echo "Precommit:    ${{ github.event.inputs.kv_run_precommit_checks }}"

    - name: Checkout KV Repository
      uses: actions/checkout@v4
      with:
        repository: ispirt/protected-auction-key-value-service
        ref: ${{ github.event.inputs.kv_build_ref }}
        fetch-depth: 0

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git

    - name: Setup Dependencies
      run: |
        sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
        sudo apt-get autoremove -y
        sudo apt-get install -y \
          apt-transport-https ca-certificates curl gnupg lsb-release \
          libssl-dev libcurl4-openssl-dev libprotobuf-dev protobuf-compiler pkg-config

    - name: Install Docker
      run: |
        sudo apt-get clean && sudo apt-get autoclean
        sudo rm -rf /var/lib/apt/lists/*
        curl -fsSL https://get.docker.com -o get-docker.sh
        sudo sh get-docker.sh && rm get-docker.sh
        sudo usermod -aG docker $USER
        docker --version

    - name: Setup Docker
      run: |
        sudo systemctl start docker
        sudo systemctl enable docker
        sudo usermod -aG docker $USER

    - name: Make Build Script Executable
      run: chmod +x ./production/packaging/build_and_test_all_in_docker

    - name: KV — build, squash, and stage
      env:
        KMS_TARGET: ${{ github.event.inputs.kms_target_environment }}
      run: |
        set -euo pipefail
        TEST_FLAG=""
        PRECOMMIT_FLAG="--no-precommit"
        if [ "${{ github.event.inputs.kv_run_tests }}" = "true" ]; then
          TEST_FLAG="--with-tests"
        fi
        if [ "${{ github.event.inputs.kv_run_precommit_checks }}" = "true" ]; then
          PRECOMMIT_FLAG=""
        fi

        if [ "$KMS_TARGET" = "uat" ]; then
          KV_MODE="nonprod"
        else
          KV_MODE="prod"
        fi

        ./production/packaging/build_and_test_all_in_docker \
          --instance azure_microsoft \
          --platform azure_microsoft \
          --mode "$KV_MODE" \
          $TEST_FLAG \
          $PRECOMMIT_FLAG

        KV_LOAD=$(docker load -i ./dist/key_value_service_image.tar)
        KV_IMAGE=$(echo "$KV_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')

        if [ "$KMS_TARGET" = "prod" ]; then
          SQUASH_NAME="kv-squash-temp"
          EXPORT_FILE="kv-squashed.tar"
          BASE_TAG="kv-squashed-base:temp"
          DF="Dockerfile.squashed"
          FINAL_IMG="kv-squashed-final:temp"
        else
          SQUASH_NAME="kv-nonprod-squash-temp"
          EXPORT_FILE="kv-nonprod-squashed.tar"
          BASE_TAG="kv-nonprod-squashed-base:temp"
          DF="Dockerfile.nonprod.squashed"
          FINAL_IMG="kv-nonprod-squashed-final:temp"
        fi

        docker create --name "$SQUASH_NAME" "$KV_IMAGE"
        docker export "$SQUASH_NAME" -o "$EXPORT_FILE"
        ENTRYPOINT_JSON=$(docker inspect "$KV_IMAGE" --format '{{json .Config.Entrypoint}}')
        CMD_JSON=$(docker inspect "$KV_IMAGE" --format '{{json .Config.Cmd}}')
        ENV_VARS=$(docker inspect "$KV_IMAGE" --format '{{range .Config.Env}}ENV {{.}}{{"\n"}}{{end}}')
        WORKDIR=$(docker inspect "$KV_IMAGE" --format '{{.Config.WorkingDir}}')
        docker import "$EXPORT_FILE" "$BASE_TAG"
        {
          echo "FROM $BASE_TAG"
          echo "$ENV_VARS"
          echo "WORKDIR ${WORKDIR:-/}"
          if [ "$ENTRYPOINT_JSON" != "null" ] && [ -n "$ENTRYPOINT_JSON" ]; then
            echo "ENTRYPOINT $ENTRYPOINT_JSON"
          fi
          if [ "$CMD_JSON" != "null" ] && [ -n "$CMD_JSON" ]; then
            echo "CMD $CMD_JSON"
          fi
        } > "$DF"
        docker build -f "$DF" -t "$FINAL_IMG" .
        LAYER_COUNT=$(docker inspect "$FINAL_IMG" | jq '.[0].RootFS.Layers | length')
        echo "Squashed image has $LAYER_COUNT layers"
        docker rm "$SQUASH_NAME"
        docker rmi "$BASE_TAG" "$KV_IMAGE" || true
        rm -f "$EXPORT_FILE" "$DF"

        mkdir -p ${{ env.STAGING_DIR }}/kv
        docker save "$FINAL_IMG" -o ${{ env.STAGING_DIR }}/kv/key_value_service_image.tar
        docker rmi "$FINAL_IMG" || true
        echo "✅ Staged KV tar ($KMS_TARGET) → ${{ env.STAGING_DIR }}/kv/key_value_service_image.tar"
        ls -lh ${{ env.STAGING_DIR }}/kv/

    - name: KV — cleanup
      if: always()
      run: |
        docker container prune -f || true
        docker image prune -f || true
        sudo rm -rf /tmp/docker-* /tmp/buildkit-* || true
        df -h

  build-ba:
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    timeout-minutes: 1440
    steps:
    - name: Display BA Build Parameters
      run: |
        echo "🚀 BA Services Build"
        echo "Build Ref:    ${{ github.event.inputs.ba_build_ref }}"
        echo "Build Flavor: ${{ github.event.inputs.kms_target_environment == 'uat' && 'non_prod' || 'prod' }}"
        echo "Release Tag:  ${{ github.event.inputs.ba_release_tag }}"
        echo "Services:     ${{ github.event.inputs.ba_services }}"
        echo "Run Tests:    ${{ github.event.inputs.ba_run_tests }}"
        echo "Precommit:    ${{ github.event.inputs.ba_run_precommit_checks }}"

    - name: Initial Cleanup
      run: |
        docker container prune -f || true
        docker image prune -a -f || true
        docker system prune -f || true
        sudo rm -rf ${GITHUB_WORKSPACE}/* || true
        sudo rm -rf ./dist/ ../dist/ || true

    - name: Checkout BA Repository
      uses: actions/checkout@v4
      with:
        repository: ispirt/ad-selection-api.bidding-and-auction-servers
        ref: ${{ github.event.inputs.ba_build_ref }}
        fetch-depth: 0

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git

    - name: Setup Dependencies
      run: |
        sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
        sudo apt-get autoremove -y
        sudo apt-get install -y \
          apt-transport-https ca-certificates curl gnupg lsb-release \
          libssl-dev libcurl4-openssl-dev libprotobuf-dev protobuf-compiler pkg-config

    - name: Install Docker
      run: |
        sudo apt-get clean && sudo apt-get autoclean
        sudo rm -rf /var/lib/apt/lists/*
        curl -fsSL https://get.docker.com -o get-docker.sh
        sudo sh get-docker.sh && rm get-docker.sh
        sudo usermod -aG docker $USER
        docker --version

    - name: Setup Docker
      run: |
        sudo systemctl start docker
        sudo systemctl enable docker
        sudo usermod -aG docker $USER

    - name: Make Build Script Executable
      run: chmod +x ./production/packaging/build_and_test_all_in_docker

    - name: Parse BA Service Paths
      id: parse_services
      run: |
        services="${{ github.event.inputs.ba_services }}"
        service_args=""
        IFS=',' read -ra SERVICE_ARRAY <<< "$services"
        for service in "${SERVICE_ARRAY[@]}"; do
          service_args="$service_args --service-path ${service// /}"
        done
        service_args="${service_args# }"
        echo "service_args=$service_args" >> $GITHUB_OUTPUT
        echo "Parsed: $service_args"

    - name: BA — build, squash, and stage
      env:
        KMS_TARGET: ${{ github.event.inputs.kms_target_environment }}
      run: |
        set -euo pipefail
        TEST_FLAG="--no-tests"
        PRECOMMIT_FLAG="--no-precommit"
        if [ "${{ github.event.inputs.ba_run_tests }}" = "true" ]; then
          TEST_FLAG=""
        fi
        if [ "${{ github.event.inputs.ba_run_precommit_checks }}" = "true" ]; then
          PRECOMMIT_FLAG=""
        fi

        if [ "$KMS_TARGET" = "uat" ]; then
          BA_BUILD_FLAVOR="non_prod"
          BID_PREFIX="bidding-nonprod-squash"
          BFE_PREFIX="bfe-nonprod-squash"
        else
          BA_BUILD_FLAVOR="prod"
          BID_PREFIX="bidding-squash"
          BFE_PREFIX="bfe-squash"
        fi

        ./production/packaging/build_and_test_all_in_docker \
          ${{ steps.parse_services.outputs.service_args }} \
          $TEST_FLAG \
          $PRECOMMIT_FLAG \
          --build-flavor "$BA_BUILD_FLAVOR" \
          --platform azure \
          --instance azure

        # Squash and stage BA tars for downstream jobs
        mkdir -p ${{ env.STAGING_DIR }}/ba

        squash_and_stage() {
          local TAR_PATH="$1"
          local STAGING_NAME="$2"
          local TEMP_PREFIX="$3"

          LOAD_OUT=$(docker load -i "$TAR_PATH")
          IMG=$(echo "$LOAD_OUT" | grep "Loaded image:" | sed 's/Loaded image: //')

          docker create --name "${TEMP_PREFIX}-temp" "$IMG"
          docker export "${TEMP_PREFIX}-temp" -o "${TEMP_PREFIX}.tar"

          ENTRYPOINT_JSON=$(docker inspect "$IMG" --format '{{json .Config.Entrypoint}}')
          CMD_JSON=$(docker inspect "$IMG" --format '{{json .Config.Cmd}}')
          ENV_VARS=$(docker inspect "$IMG" --format '{{range .Config.Env}}ENV {{.}}{{"\n"}}{{end}}')
          WORKDIR=$(docker inspect "$IMG" --format '{{.Config.WorkingDir}}')

          # Envoy-distroless BFE: normalize WORKDIR for single-layer squash
          if [[ "$TEMP_PREFIX" == bfe-* ]] && [ "$WORKDIR" = "/home/nonroot" ]; then
            WORKDIR="/"
          fi

          docker import "${TEMP_PREFIX}.tar" "${TEMP_PREFIX}-base:temp"
          {
            echo "FROM ${TEMP_PREFIX}-base:temp"
            echo "$ENV_VARS"
            echo "WORKDIR ${WORKDIR:-/}"
            [ "$ENTRYPOINT_JSON" != "null" ] && [ -n "$ENTRYPOINT_JSON" ] && echo "ENTRYPOINT $ENTRYPOINT_JSON"
            [ "$CMD_JSON" != "null" ] && [ -n "$CMD_JSON" ] && echo "CMD $CMD_JSON"
          } > "Dockerfile.${TEMP_PREFIX}"
          docker build -f "Dockerfile.${TEMP_PREFIX}" -t "${TEMP_PREFIX}-final:temp" .

          docker save "${TEMP_PREFIX}-final:temp" -o "${{ env.STAGING_DIR }}/ba/${STAGING_NAME}"
          docker rm "${TEMP_PREFIX}-temp"
          docker rmi "${TEMP_PREFIX}-base:temp" "${TEMP_PREFIX}-final:temp" "$IMG" || true
          rm -f "${TEMP_PREFIX}.tar" "Dockerfile.${TEMP_PREFIX}"
        }

        SERVICES="${{ github.event.inputs.ba_services }}"
        if echo "$SERVICES" | grep -q "bidding_service"; then
          echo "Squashing bidding_service ($KMS_TARGET)..."
          squash_and_stage ./dist/azure/bidding_service_image.tar bidding_service_image.tar "$BID_PREFIX"
          echo "✅ Staged bidding_service_image.tar"
        fi
        if echo "$SERVICES" | grep -q "buyer_frontend_service"; then
          echo "Squashing buyer_frontend_service ($KMS_TARGET)..."
          squash_and_stage ./dist/azure/buyer_frontend_service_image.tar buyer_frontend_service_image.tar "$BFE_PREFIX"
          echo "✅ Staged buyer_frontend_service_image.tar"
        fi
        ls -lh ${{ env.STAGING_DIR }}/ba/

    - name: BA — cleanup
      if: always()
      run: |
        docker container prune -f || true
        docker image prune -f || true
        sudo rm -rf ./bidding-and-auction-servers/ ../bidding-and-auction-servers/ || true
        sudo rm -rf /tmp/docker-* /tmp/buildkit-* || true
        sudo chown -R $(whoami):$(whoami) ${GITHUB_WORKSPACE} || true
        df -h

  # ============================================================
  # KMS POLICY UPDATE — uses local tar images
  # ============================================================

  update-kms-policy:
    needs: [build-kv, build-ba]
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    if: ${{ github.event.inputs.update_kms_policy == 'true' }}
    environment: ${{ github.event.inputs.kms_target_environment == 'uat' && 'azure-uat' || 'azure-prod' }}
    env:
      KV_TAG: ${{ github.event.inputs.kv_release_tag }}
      BA_TAG: ${{ github.event.inputs.ba_release_tag }}
      IMAGE_FLAVOR: ${{ github.event.inputs.kms_target_environment == 'uat' && 'nonprod' || 'prod' }}
      
    steps:
    - name: Checkout repository (for policy files and signing script)
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_AKS_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_AKS_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_AKS_SUBSCRIPTION_ID }}

    - name: Install Azure CLI & Confcom extension
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        sudo apt-get update && sudo apt-get install -y jq
        az version
        CONFCOM_VERSION=$(tr -d '[:space:]' < policies/confcom.version)
        az extension remove --name confcom 2>/dev/null || true
        az extension add --name confcom --version "$CONFCOM_VERSION"
        az extension list --query "[?name=='confcom'].[name,version]" -o tsv
        az version

    - name: Setup Python virtual environment
      run: |
        # if no python3-venv, install it
        if ! command -v python3-venv &> /dev/null; then
          sudo apt-get update
          sudo apt-get install -y python3-venv
        fi
        python3 -m venv ccf_env
        source ccf_env/bin/activate
        pip install --upgrade pip
        pip install ccf==6.0.10
        echo "ccf_env/bin" >> $GITHUB_PATH

    - name: Load images from staging directory
      run: |
        echo "Loading KV service image..."
        KV_LOAD=$(docker load -i ${{ env.STAGING_DIR }}/kv/key_value_service_image.tar)
        KV_IMAGE=$(echo "$KV_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
        docker tag $KV_IMAGE kv-service:${IMAGE_FLAVOR}-${KV_TAG}
        echo "✅ kv-service:${IMAGE_FLAVOR}-${KV_TAG} ready"

        echo "Loading bidding service image..."
        OFFER_LOAD=$(docker load -i ${{ env.STAGING_DIR }}/ba/bidding_service_image.tar)
        OFFER_IMAGE=$(echo "$OFFER_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
        docker tag $OFFER_IMAGE offer-service:${IMAGE_FLAVOR}-${BA_TAG}
        echo "✅ offer-service:${IMAGE_FLAVOR}-${BA_TAG} ready"

        echo "Loading buyer frontend service image..."
        OFE_LOAD=$(docker load -i ${{ env.STAGING_DIR }}/ba/buyer_frontend_service_image.tar)
        OFE_IMAGE=$(echo "$OFE_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
        docker tag $OFE_IMAGE ofe-service:${IMAGE_FLAVOR}-${BA_TAG}
        echo "✅ ofe-service:${IMAGE_FLAVOR}-${BA_TAG} ready"

    - name: Generate CCE policies from local images
      env:
        KMS_TARGET: ${{ github.event.inputs.kms_target_environment }}
      run: |
        # confcom rejects using -i (policy JSON) together with --image — only one source allowed.
        # Point the policy JSON at the locally tagged images (already loaded above), then use -i only.
        set -euo pipefail
        KV_IMG="kv-service:${IMAGE_FLAVOR}-${KV_TAG}"
        OFE_IMG="ofe-service:${IMAGE_FLAVOR}-${BA_TAG}"
        OFFER_IMG="offer-service:${IMAGE_FLAVOR}-${BA_TAG}"

        KV_POLICY_JSON="policies/kv-policy.json"
        OFE_POLICY_JSON="policies/ofe-policy.json"
        OFFER_POLICY_JSON="policies/offer-policy.json"

        if [ "$KMS_TARGET" = "uat" ]; then
          PROD_KMS_URL="https://depa-inferencing-kms-azure.ispirt.in"
          UAT_KMS_URL="https://depa-inferencing-kms-uat-azure.ispirt.in"
          for policy in kv-policy.json ofe-policy.json offer-policy.json; do
            sed \
              -e 's/:prod-/:nonprod-/g' \
              -e "s|${PROD_KMS_URL}|${UAT_KMS_URL}|g" \
              "policies/$policy" > "/tmp/$policy"
          done
          KV_POLICY_JSON="/tmp/kv-policy.json"
          OFE_POLICY_JSON="/tmp/ofe-policy.json"
          OFFER_POLICY_JSON="/tmp/offer-policy.json"
        fi

        jq --arg img "$KV_IMG" '.containers[0].properties.image = $img' "$KV_POLICY_JSON" > /tmp/kv-policy-run.json
        KV_POLICY=$(az confcom acipolicygen -y -i /tmp/kv-policy-run.json --print-policy | base64 --decode | sha256sum | cut -d' ' -f1)

        jq --arg img "$OFE_IMG" '.containers[0].properties.image = $img' "$OFE_POLICY_JSON" > /tmp/ofe-policy-run.json
        OFE_POLICY=$(az confcom acipolicygen -y -i /tmp/ofe-policy-run.json --print-policy | base64 --decode | sha256sum | cut -d' ' -f1)

        jq --arg img "$OFFER_IMG" '.containers[0].properties.image = $img' "$OFFER_POLICY_JSON" > /tmp/offer-policy-run.json
        OFFER_POLICY=$(az confcom acipolicygen -y -i /tmp/offer-policy-run.json --print-policy | base64 --decode | sha256sum | cut -d' ' -f1)

        rm -f /tmp/kv-policy-run.json /tmp/ofe-policy-run.json /tmp/offer-policy-run.json
        rm -f /tmp/kv-policy.json /tmp/ofe-policy.json /tmp/offer-policy.json

        echo "KV_POLICY=$KV_POLICY" >> $GITHUB_ENV
        echo "✅ KV policy:      $KV_POLICY"

        echo "OFE_POLICY=$OFE_POLICY" >> $GITHUB_ENV
        echo "✅ OFE policy:     $OFE_POLICY"

        echo "OFFER_POLICY=$OFFER_POLICY" >> $GITHUB_ENV
        echo "✅ Offer policy: $OFFER_POLICY"

        if [ "$KMS_TARGET" = "uat" ]; then
          ALLOWALL_PATH="${GITHUB_WORKSPACE}/deployment-scripts/azure/offer-service/environment/demo/cce-policies/allow_all.base64"
          ALLOWALL_POLICY=$(base64 --decode < "$ALLOWALL_PATH" | sha256sum | cut -d' ' -f1)
          echo "ALLOWALL_POLICY=$ALLOWALL_POLICY" >> $GITHUB_ENV
          echo "✅ Allow-all (UAT) hostdata: $ALLOWALL_POLICY"
        else
          echo "ALLOWALL_POLICY=" >> $GITHUB_ENV
        fi

    - name: Generate key release policy JSON
      env:
        KMS_TARGET: ${{ github.event.inputs.kms_target_environment }}
        KV_POLICY: ${{ env.KV_POLICY }}
        OFE_POLICY: ${{ env.OFE_POLICY }}
        OFFER_POLICY: ${{ env.OFFER_POLICY }}
        ALLOWALL_POLICY: ${{ env.ALLOWALL_POLICY }}
      run: |
        if [ "$KMS_TARGET" = "uat" ]; then
          cat > $GITHUB_WORKSPACE/key_release_policy.json << EOF
        {
          "actions": [
            {
              "name": "set_key_release_policy",
              "args": {
                "service": "offer-services",
                "type": "add",
                "claims": {
                  "x-ms-sevsnpvm-hostdata": [
                    "$KV_POLICY",
                    "$OFE_POLICY",
                    "$OFFER_POLICY",
                    "$ALLOWALL_POLICY"
                  ]
                }
              }
            }
          ]
        }
        EOF
        else
          cat > $GITHUB_WORKSPACE/key_release_policy.json << EOF
        {
          "actions": [
            {
              "name": "set_key_release_policy",
              "args": {
                "service": "offer-services",
                "type": "add",
                "claims": {
                  "x-ms-sevsnpvm-hostdata": [
                    "$KV_POLICY",
                    "$OFE_POLICY",
                    "$OFFER_POLICY"
                  ]
                }
              }
            }
          ]
        }
        EOF
        fi

        echo "Key release policy JSON generated:"
        cat $GITHUB_WORKSPACE/key_release_policy.json

    - name: Sign and submit key release policy proposal
      env:
        AZURE_VAULT_NAME: ${{ vars.KMS_SIGNING_KV }}
        KMS_DEPLOYMENT_NAME: ${{ vars.KMS_CONFIDENTIAL_LEDGER }}
        PROPOSAL: ${{ github.workspace }}/key_release_policy.json
      run: |
        source ccf_env/bin/activate
        ./tools/signing/sign.sh

    - name: Display current key release policy
      env:
        KMS_DEPLOYMENT_NAME: ${{ vars.KMS_CONFIDENTIAL_LEDGER }}
      run: |
        GOV_BASE="https://${KMS_DEPLOYMENT_NAME}.confidential-ledger.azure.com"
        GOV_BASE="${GOV_BASE%/}"
        TOKEN=$(az account get-access-token --resource https://confidential-ledger.azure.com | jq -r '.accessToken')
        curl -sS -k "$GOV_BASE/app/keyReleasePolicy" -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" | jq

    - name: Cleanup KMS job artifacts
      if: always()
      run: |
        docker rmi kv-service:${IMAGE_FLAVOR}-${KV_TAG} offer-service:${IMAGE_FLAVOR}-${BA_TAG} ofe-service:${IMAGE_FLAVOR}-${BA_TAG} || true
        docker container prune -f || true
        docker image prune -f || true
        rm -f $GITHUB_WORKSPACE/key_release_policy.json || true

  # ============================================================
  # ACR PUSH — push all images to container registry
  # ============================================================

  push-to-acr:
    needs: [build-kv, build-ba]
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    if: ${{ github.event.inputs.push_to_acr == 'true' }}

    steps:
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

    - name: Load and push images to ACR
      env:
        KMS_TARGET: ${{ github.event.inputs.kms_target_environment }}
      run: |
        set -euo pipefail
        if [ "$KMS_TARGET" = "uat" ]; then
          TAG_FLAVOR="nonprod"
        else
          TAG_FLAVOR="prod"
        fi
        REPO="${{ env.REGISTRY }}/${{ env.REPO_PATH }}"
        KV_TAG="${{ github.event.inputs.kv_release_tag }}"
        BA_TAG="${{ github.event.inputs.ba_release_tag }}"
        SERVICES="${{ github.event.inputs.ba_services }}"
        STAGING="${{ env.STAGING_DIR }}"

        echo "ACR tag flavor: $TAG_FLAVOR (environment: $KMS_TARGET)"

        echo "Loading KV..."
        KV_LOAD=$(docker load -i "${STAGING}/kv/key_value_service_image.tar")
        KV_IMAGE=$(echo "$KV_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
        KV_ACR_IMAGE="$REPO/key-value-service:${TAG_FLAVOR}-${KV_TAG}"
        docker tag "$KV_IMAGE" "$KV_ACR_IMAGE"
        docker push "$KV_ACR_IMAGE"
        echo "✅ Pushed: $KV_ACR_IMAGE"
        docker rmi "$KV_IMAGE" || true

        if echo "$SERVICES" | grep -q "bidding_service"; then
          echo "Loading bidding service..."
          BIDDING_LOAD=$(docker load -i "${STAGING}/ba/bidding_service_image.tar")
          BIDDING_IMAGE=$(echo "$BIDDING_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
          BIDDING_ACR_IMAGE="$REPO/bidding-service:${TAG_FLAVOR}-${BA_TAG}"
          docker tag "$BIDDING_IMAGE" "$BIDDING_ACR_IMAGE"
          docker push "$BIDDING_ACR_IMAGE"
          echo "✅ Pushed: $BIDDING_ACR_IMAGE"
          docker rmi "$BIDDING_IMAGE" || true
        fi

        if echo "$SERVICES" | grep -q "buyer_frontend_service"; then
          echo "Loading buyer frontend service..."
          OFE_LOAD=$(docker load -i "${STAGING}/ba/buyer_frontend_service_image.tar")
          OFE_IMAGE=$(echo "$OFE_LOAD" | grep "Loaded image:" | sed 's/Loaded image: //')
          OFE_ACR_IMAGE="$REPO/buyer-frontend-service:${TAG_FLAVOR}-${BA_TAG}"
          docker tag "$OFE_IMAGE" "$OFE_ACR_IMAGE"
          docker push "$OFE_ACR_IMAGE"
          echo "✅ Pushed: $OFE_ACR_IMAGE"
          docker rmi "$OFE_IMAGE" || true
        fi

    - name: Cleanup ACR push artifacts
      if: always()
      run: |
        docker container prune -f || true
        docker image prune -f || true
        sudo chown -R $(whoami):$(whoami) ${GITHUB_WORKSPACE} || true

  # ============================================================
  # SBOM GENERATION — after ACR pushes complete
  # ============================================================

  generate-sboms:
    needs: [push-to-acr]
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    if: ${{ github.event.inputs.push_to_acr == 'true' && github.event.inputs.generate_sboms == 'true' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Syft
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
        syft version

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

    - name: Generate SBOMs
      run: |
        KV_TAG="${{ github.event.inputs.kv_release_tag }}"
        BA_TAG="${{ github.event.inputs.ba_release_tag }}"
        FLAVOR="${{ github.event.inputs.kms_target_environment == 'uat' && 'nonprod' || 'prod' }}"
        REPO="${{ env.REGISTRY }}/${{ env.REPO_PATH }}"
        SERVICES="${{ github.event.inputs.ba_services }}"

        echo "🔍 Generating SBOMs (${FLAVOR})..."

        syft $REPO/key-value-service:${FLAVOR}-${KV_TAG} \
          -o spdx-json=kv-${FLAVOR}-${KV_TAG}-sbom.spdx.json

        if echo "$SERVICES" | grep -q "bidding_service"; then
          syft $REPO/bidding-service:${FLAVOR}-${BA_TAG} \
            -o spdx-json=bidding-service-${FLAVOR}-${BA_TAG}-sbom.spdx.json
        fi

        if echo "$SERVICES" | grep -q "buyer_frontend_service"; then
          syft $REPO/buyer-frontend-service:${FLAVOR}-${BA_TAG} \
            -o spdx-json=buyer-frontend-service-${FLAVOR}-${BA_TAG}-sbom.spdx.json
        fi

        syft dir:. -o spdx-json=repo-sbom.spdx.json

        echo "✅ SBOMs generated:"
        ls -lh *-sbom.spdx.json

    - name: Upload SBOM Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-files-${{ github.event.inputs.kms_target_environment }}-${{ github.event.inputs.ba_release_tag }}
        path: '*-sbom.spdx.json'
        retention-days: 90

    - name: Cleanup SBOM job
      if: always()
      run: |
        rm -f *-sbom.spdx.json || true
        docker logout ${{ env.REGISTRY }} || true

  # ============================================================
  # STAGING CLEANUP — always runs last regardless of path taken
  # ============================================================

  cleanup-staging:
    needs: [build-kv, build-ba, push-to-acr, update-kms-policy]
    runs-on: ${{ fromJSON(github.event.inputs.kms_target_environment == 'uat' && '["self-hosted", "uat"]' || '["self-hosted", "prod"]') }}
    if: always()
    steps:
    - name: Remove staging directory
      run: |
        echo "🧹 Removing staging directory ${{ env.STAGING_DIR }}..."
        sudo rm -rf ${{ env.STAGING_DIR }} || true
        echo "✅ Staging cleanup complete"
        source ccf_env/bin/deactivate || true
        rm -rf ccf_env || true
