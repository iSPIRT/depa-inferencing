name: Cleanup GCP Deployments

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  cleanup:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update CI environment
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ENVIRONMENT: ${{ secrets.GCP_ENVIRONMENT }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_BUYER_DOMAIN_NAME: ${{ secrets.GCP_BUYER_DOMAIN_NAME }}
          GCP_DNS_ZONE: ${{ secrets.GCP_DNS_ZONE }}
          GCP_SSL_CERTIFICATE_ID: ${{ secrets.GCP_SSL_CERTIFICATE_ID }}
          GCP_VM_SERVICE_ACCOUNT: ${{ secrets.GCP_VM_SERVICE_ACCOUNT }}
        run: |
          sed -i 's|<gcp_project_id>|'"$GCP_PROJECT_ID"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<environment>|'"$GCP_ENVIRONMENT"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<gcp_region>|'"$GCP_REGION"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<buyer_domain_name>|'"$GCP_BUYER_DOMAIN_NAME"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<dns_zone>|'"$GCP_DNS_ZONE"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<ssl_certificate_id>|'"$GCP_SSL_CERTIFICATE_ID"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf
          sed -i 's|<vm_service_account>|'"$GCP_VM_SERVICE_ACCOUNT"'|g' ./deployment-scripts/gcp/offer-service/environment/ci/buyer/buyer.tf

      - name: Restore Terraform state
        working-directory: ./deployment-scripts/gcp/offer-service/environment/ci/buyer
        run: |
          if [ -d "$HOME/.gcp-ci-tfstate" ]; then
            cp -rf $HOME/.gcp-ci-tfstate/.terraform . 2>/dev/null || true
            cp -f $HOME/.gcp-ci-tfstate/terraform.tfstate* . 2>/dev/null || true
          fi

      - name: Terraform init
        working-directory: ./deployment-scripts/gcp/offer-service/environment/ci/buyer
        run: terraform init

      - name: Terraform destroy (always cleanup)
        if: always()
        working-directory: ./deployment-scripts/gcp/offer-service/environment/ci/buyer
        run: terraform destroy -auto-approve

      - name: Clean up persisted state
        if: always()
        run: rm -rf $HOME/.gcp-ci-tfstate
